<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PandaPedia | Digital & Service Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; padding-bottom: 90px; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .product-card { 
            background: white; 
            border-radius: 1.25rem; 
            border: 1px solid #f1f5f9; 
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        
        .hero-bg {
            background-color: #0891b2;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .variant-option {
            border: 2px solid #f1f5f9;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .variant-option.selected {
            border-color: #0891b2;
            background-color: #f0f9ff;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            position: relative;
            padding-bottom: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #94a3b8;
        }
        
        .tab-btn.active {
            color: #0891b2;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: #0891b2;
            border-radius: 99px;
        }

        .nav-active { color: #0891b2 !important; }
        .banner-slide { min-width: 100%; transition: transform 0.5s ease-in-out; }
        .category-pill { transition: all 0.2s; cursor: pointer; white-space: nowrap; border: 1px solid #e2e8f0; background: white; }
        .category-pill.active { background-color: #0891b2; color: white; border-color: #0891b2; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Tombol WA Melayang -->
    <a href="https://wa.me/628976071999" target="_blank" class="fixed right-5 bottom-24 w-14 h-14 bg-green-500 rounded-full flex items-center justify-center text-white shadow-2xl z-[99] border-4 border-white animate-bounce">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <!-- Navigasi Atas -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2" onclick="showPage('home-page')">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-500 to-cyan-700 rounded-xl flex items-center justify-center text-white font-extrabold shadow-lg">P</div>
                <div>
                    <span class="block font-black text-sm tracking-tighter uppercase leading-none">PandaPedia</span>
                    <span class="text-[8px] font-bold text-cyan-600 uppercase tracking-[0.2em]">Digital Store</span>
                </div>
            </div>
            <button class="w-9 h-9 rounded-xl bg-slate-50 flex items-center justify-center text-slate-600 border border-slate-100"><i class="fa-solid fa-bell text-xs"></i></button>
        </div>
    </nav>

    <!-- Navigasi Bawah -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 backdrop-blur-lg border border-slate-100 px-8 py-3 mb-4 rounded-[2rem] z-[100] flex justify-around items-center shadow-xl">
        <button onclick="showPage('home-page')" class="flex flex-col items-center space-y-1 nav-btn nav-active" id="nav-home">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Beranda</span>
        </button>
        <button onclick="showPage('reseller-page')" class="flex flex-col items-center space-y-1 text-slate-400 nav-btn" id="nav-reseller">
            <i class="fa-solid fa-users-gear text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Reseller</span>
        </button>
    </div>

    <!-- Halaman Beranda -->
    <div id="home-page" class="page active pt-16">
        <!-- Banner Auto Slider -->
        <div class="px-5 mt-6 mb-2">
            <div class="relative overflow-hidden rounded-[2.5rem] h-40 bg-slate-200 shadow-inner">
                <div id="banner-container" class="flex h-full transition-transform duration-500 ease-in-out">
                    <div class="banner-slide flex items-center justify-between px-8 bg-gradient-to-r from-cyan-600 to-cyan-400 text-white">
                        <div class="text-left">
                            <span class="bg-white/20 px-2 py-0.5 rounded text-[8px] font-bold uppercase tracking-widest">Promo Terbatas</span>
                            <h2 class="text-lg font-black mt-1 leading-tight uppercase italic">Diskon Jasa Web<br>Up to 30%</h2>
                        </div>
                        <i class="fa-solid fa-laptop-code text-5xl opacity-30"></i>
                    </div>
                    <div class="banner-slide flex items-center justify-between px-8 bg-gradient-to-r from-purple-600 to-indigo-500 text-white">
                        <div class="text-left">
                            <span class="bg-white/20 px-2 py-0.5 rounded text-[8px] font-bold uppercase tracking-widest">New Arrival</span>
                            <h2 class="text-lg font-black mt-1 leading-tight uppercase italic">Akun TikTok<br>Siap Live</h2>
                        </div>
                        <i class="fa-solid fa-bolt text-5xl opacity-30"></i>
                    </div>
                </div>
                <div class="absolute bottom-4 left-8 flex space-x-1.5" id="banner-dots"></div>
            </div>
        </div>

        <!-- Hero Section -->
        <section class="hero-bg pt-8 pb-20 px-6 text-center text-white rounded-b-[3.5rem] shadow-2xl">
            <h1 class="text-3xl font-black uppercase italic mb-2 tracking-tight">EXPERT SERVICES</h1>
            <p class="text-[10px] font-bold opacity-80 mb-8 uppercase tracking-widest">Solusi Jasa Profesional PandaPedia</p>
            <div class="flex overflow-x-auto gap-4 no-scrollbar pb-4" id="service-list"></div>
        </section>

        <!-- Kotak Pencarian -->
        <div class="px-6 -mt-9 mb-6">
            <div class="bg-white rounded-[2rem] shadow-xl p-1.5 flex items-center border border-slate-100">
                <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Cari layanan atau produk..." class="flex-1 bg-transparent px-6 py-4 text-xs font-semibold outline-none">
                <div class="w-12 h-12 bg-cyan-600 rounded-[1.5rem] flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>
        </div>

        <!-- Kategori Cepat -->
        <div class="px-6 mb-8 flex overflow-x-auto gap-3 no-scrollbar" id="category-container">
            <button onclick="filterByCategory('Semua')" class="category-pill active px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-wider">Semua</button>
            <button onclick="filterByCategory('Streaming')" class="category-pill px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-wider">Streaming</button>
            <button onclick="filterByCategory('AI & Tools')" class="category-pill px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-wider">AI & Tools</button>
            <button onclick="filterByCategory('Editing')" class="category-pill px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-wider">Editing</button>
            <button onclick="filterByCategory('Sosmed')" class="category-pill px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-wider">Sosmed</button>
        </div>

        <!-- Katalog Utama -->
        <div class="px-5 mb-12">
            <div class="grid grid-cols-2 gap-4" id="main-catalog"></div>
        </div>
    </div>

    <!-- Halaman Detail/Checkout (Update Look Berdasarkan Referensi) -->
    <div id="detail-page" class="page pt-6 pb-28 bg-white">
        <div class="px-6 max-w-lg mx-auto">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('home-page')" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-100"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 class="text-sm font-black uppercase text-slate-800 italic tracking-tight">Secure Checkout</h2>
            </div>
            
            <!-- Header Produk -->
            <div id="checkout-header" class="mb-6"></div>

            <!-- Tab Menu -->
            <div class="flex border-b border-slate-100 mb-6 gap-8">
                <button id="tab-desc-btn" onclick="switchTab('desc')" class="tab-btn active">Deskripsi</button>
                <button id="tab-tnc-btn" onclick="switchTab('tnc')" class="tab-btn">Syarat & Ketentuan</button>
            </div>
            
            <!-- Deskripsi -->
            <div id="tab-content" class="text-[12px] text-slate-500 font-medium leading-relaxed mb-8 min-h-[50px]"></div>

            <!-- Bagian Pilih Paket -->
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-[11px] font-black uppercase text-slate-800 tracking-wider italic">Pilih Paket Kamu</h3>
                <span class="bg-cyan-50 text-cyan-600 text-[8px] font-black px-2 py-1 rounded">Maks 1 Qty</span>
            </div>

            <!-- List Paket (Varian) -->
            <div id="variants-list" class="space-y-3 mb-8"></div>

            <!-- Info Penting -->
            <div class="bg-cyan-50/50 border border-cyan-100 rounded-2xl p-4 flex gap-3 mb-6">
                <div class="w-8 h-8 bg-cyan-600 rounded-full flex items-center justify-center text-white shrink-0">
                    <i class="fa-solid fa-user text-xs"></i>
                </div>
                <div>
                    <h4 class="text-[10px] font-black text-cyan-700 uppercase leading-none mb-1">Penting!</h4>
                    <p class="text-[9px] font-medium text-cyan-600/80 leading-tight">Pastikan data target (Email/ID) sudah benar sebelum melakukan pembayaran.</p>
                </div>
            </div>

            <!-- Input Target & Button -->
            <div class="space-y-4">
                <input type="text" id="cust-target" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-xs font-bold outline-none focus:border-cyan-500 focus:bg-white" placeholder="Masukkan Email / ID Akun">
                <button onclick="processPayment()" class="w-full py-5 bg-gradient-to-r from-cyan-600 to-cyan-500 text-white rounded-[1.5rem] font-black uppercase text-sm shadow-xl active:scale-95 transition-transform">Beli Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Halaman Pembayaran -->
    <div id="payment-page" class="page pt-6 pb-12 bg-slate-50">
        <div class="px-6 max-w-md mx-auto text-center">
            <div class="bg-white rounded-[3.5rem] p-10 shadow-2xl">
                <img id="qris-img" class="w-64 h-64 rounded-2xl mx-auto mb-10 border p-2" alt="QRIS">
                <div class="bg-slate-900 p-6 rounded-[2rem] text-white text-left mb-10">
                    <p id="p-name" class="font-black text-[10px] uppercase italic text-cyan-400 mb-1"></p>
                    <p id="p-total" class="text-xl font-black"></p>
                </div>
                <button onclick="confirmWA()" class="w-full py-5 bg-green-500 text-white rounded-[1.5rem] font-black uppercase text-xs flex items-center justify-center gap-3">
                    <i class="fa-brands fa-whatsapp text-xl"></i> Kirim Bukti
                </button>
                <button onclick="showPage('home-page')" class="mt-6 text-[10px] font-black text-slate-300 uppercase">Batalkan Pesanan</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_WA = "628976071999";
        let selectedProduct = null;
        let selectedVariantIdx = 0;
        let currentBannerIdx = 0;

        // Data Jasa
        const services = [
            { id: 's1', name: "PEMBUATAN WEBSITE PROFESIONAL", price: 1000000, image: "https://placehold.co/400x400/0891b2/white?text=WEB+DEV", desc: "Pembuatan Landing Page, Web Portfolio, atau Company Profile profesional (1jt - 5jt).", sales: "120+", variants: [{title: "Paket Dasar", price: 1000000}, {title: "Paket Bisnis", price: 2500000}, {title: "Paket Custom", price: 5000000}] },
            { id: 's6', name: "TIKTOK SIAP LIVE / LEVEL", price: 100000, image: "https://placehold.co/400x400/000000/white?text=TIKTOK+LIVE", desc: "TikTok 1K followers siap live atau level 20-35.", sales: "340+", variants: [{title: "Siap Live", price: 100000}, {title: "Level Akun", price: 250000}] }
        ];

        // Data Katalog Dasar
        const allCatalog = [
            { id: 'p1', name: "NETFLIX PREMIUM", price: 15000, category: "Streaming", image: "https://placehold.co/400x400/e50914/white?text=NETFLIX", desc: "Nikmati tayangan Netflix kualitas 4K UHD tanpa hambatan.", sales: "5k+" },
            { id: 'p2', name: "YOUTUBE PREMIUM", price: 10000, category: "Streaming", image: "https://placehold.co/400x400/ff0000/white?text=YOUTUBE", desc: "Nonton YouTube tanpa iklan, putar di latar belakang, dan akses YouTube Music.", sales: "8k+" },
            { id: 'p3', name: "DISNEY+ HOTSTAR", price: 25000, category: "Streaming", image: "https://placehold.co/400x400/003977/white?text=DISNEY", desc: "Akses film blockbuster Disney, Pixar, Marvel, Star Wars secara eksklusif.", sales: "2k+" },
            { id: 'p5', name: "CANVA PRO", price: 5000, category: "Editing", image: "https://placehold.co/400x400/7c3aed/white?text=CANVA", desc: "Akses semua fitur premium Canva untuk desain profesional.", sales: "12k+" },
            { id: 'p7', name: "CHATGPT PLUS", price: 28000, category: "AI & Tools", image: "https://placehold.co/400x400/10b981/white?text=CHATGPT", desc: "Akses model terbaru GPT-4 dengan kecepatan prioritas.", sales: "1k+" },
            { id: 'p8', name: "CAPCUT PRO", price: 15000, category: "Editing", image: "https://placehold.co/400x400/000000/white?text=CAPCUT", desc: "Edit video tanpa watermark dengan fitur AI tercanggih.", sales: "2k+" }
        ];

        // Fungsi Auto-Generate Varian jika tidak ada (untuk memenuhi permintaan 3 pilihan)
        function generateVariants(product) {
            if (product.variants && product.variants.length >= 3) return product.variants;
            
            const basePrice = product.price;
            return [
                { title: "1 Bulan - Fast Proses", price: basePrice, badge: "BEST SELLER" },
                { title: "2 Bulan - Durasi Lebih Lama", price: Math.floor(basePrice * 1.9), badge: "HEMAT 5%" },
                { title: "3 Bulan - Paket Premium", price: Math.floor(basePrice * 2.7), badge: "HEMAT 10%" }
            ];
        }

        function renderServices() {
            const container = document.getElementById('service-list');
            if(!container) return;
            container.innerHTML = services.map(s => `
                <div class="min-w-[160px] bg-white rounded-[1.5rem] p-3 border shadow-sm" onclick="openCheckout('${s.id}', true)">
                    <img src="${s.image}" class="w-full aspect-square rounded-[1.2rem] object-cover mb-2">
                    <h3 class="text-[8px] font-black text-slate-800 truncate uppercase leading-tight">${s.name}</h3>
                    <p class="text-[10px] font-black text-cyan-600 mt-1">Rp ${s.price.toLocaleString('id-ID')}</p>
                </div>
            `).join('');
        }

        function renderCatalog(items) {
            const container = document.getElementById('main-catalog');
            if(!container) return;
            container.innerHTML = items.map(p => `
                <div class="product-card" onclick="openCheckout('${p.id}', false)">
                    <div class="relative">
                        <img src="${p.image}" class="w-full aspect-square object-cover">
                        <span class="absolute bottom-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[7px] font-black text-slate-600 shadow-sm">${p.sales} Terjual</span>
                    </div>
                    <div class="p-3">
                        <h3 class="text-[9px] font-black uppercase text-slate-800 truncate">${p.name}</h3>
                        <p class="text-[11px] font-black text-cyan-600 mt-1">Rp ${p.price.toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');
        }

        function openCheckout(id, isService) {
            selectedProduct = isService ? services.find(s => s.id === id) : allCatalog.find(p => p.id === id);
            selectedVariantIdx = 0;
            
            // Pasang header ala referensi gambar
            document.getElementById('checkout-header').innerHTML = `
                <div class="flex gap-5 items-start">
                    <img src="${selectedProduct.image}" class="w-24 h-24 rounded-2xl object-cover shadow-lg">
                    <div class="pt-1">
                        <h1 class="text-base font-black text-slate-900 leading-tight uppercase italic mb-1">${selectedProduct.name}</h1>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Mulai dari</p>
                        <p class="text-xl font-black text-cyan-600">Rp ${selectedProduct.price.toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `;
            
            switchTab('desc');
            renderVariants();
            showPage('detail-page');
        }

        function renderVariants() {
            const list = document.getElementById('variants-list');
            const v = generateVariants(selectedProduct);
            selectedProduct.activeVariants = v;

            list.innerHTML = v.map((item, idx) => `
                <div class="variant-option p-4 rounded-2xl ${idx === selectedVariantIdx ? 'selected' : 'bg-white'}" onclick="selectVariant(${idx})">
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${idx === selectedVariantIdx ? 'border-cyan-600' : 'border-slate-200'}">
                            ${idx === selectedVariantIdx ? '<div class="w-2.5 h-2.5 rounded-full bg-cyan-600"></div>' : ''}
                        </div>
                        <div class="flex-1">
                            <h4 class="text-[10px] font-black text-slate-800 uppercase">${item.title}</h4>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[8px] font-bold text-green-500 uppercase flex items-center gap-1"><i class="fa-solid fa-bolt text-[7px]"></i> Real User</span>
                                <span class="text-[8px] font-bold text-cyan-500 uppercase flex items-center gap-1"><i class="fa-solid fa-shield text-[7px]"></i> Full Garansi</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[11px] font-black text-cyan-700">Rp ${item.price.toLocaleString('id-ID')}</p>
                            ${item.badge ? `<span class="inline-block mt-1 text-[7px] font-black bg-cyan-600 text-white px-2 py-0.5 rounded-full uppercase">${item.badge}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            selectedProduct.currentPrice = v[selectedVariantIdx].price;
            selectedProduct.currentVariant = v[selectedVariantIdx].title;
        }

        function selectVariant(idx) {
            selectedVariantIdx = idx;
            renderVariants();
        }

        function switchTab(tab) {
            const content = tab === 'desc' ? selectedProduct.desc : "1. Proses cepat 1-10 menit (Maks 24 jam).\n2. Akun Legal & Bergaransi Full.\n3. Dilarang mengubah data akun tanpa izin.";
            document.getElementById('tab-content').innerText = content;
            document.getElementById('tab-desc-btn').classList.toggle('active', tab === 'desc');
            document.getElementById('tab-tnc-btn').classList.toggle('active', tab === 'tnc');
        }

        function processPayment() {
            const target = document.getElementById('cust-target').value;
            if(!target) return alert("Mohon isi Email/ID Akun!");
            
            const randomCode = Math.floor(Math.random() * 99);
            const final = selectedProduct.currentPrice + randomCode;
            
            document.getElementById('p-name').innerText = selectedProduct.name;
            document.getElementById('p-total').innerText = `Rp ${final.toLocaleString('id-ID')}`;
            document.getElementById('qris-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=PAY-${final}`;
            
            selectedProduct.finalTotal = final;
            selectedProduct.target = target;
            showPage('payment-page');
        }

        function confirmWA() {
            const msg = `Halo PandaPedia, saya mau bayar:\n\nProduk: ${selectedProduct.name}\nPaket: ${selectedProduct.currentVariant}\nData: ${selectedProduct.target}\nTotal: Rp ${selectedProduct.finalTotal.toLocaleString('id-ID')}\n\nMohon diproses ya!`;
            window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            const filtered = cat === 'Semua' ? allCatalog : allCatalog.filter(p => p.category === cat);
            renderCatalog(filtered);
        }

        function initBanner() {
            const container = document.getElementById('banner-container');
            const slides = document.querySelectorAll('.banner-slide');
            if(!container) return;
            setInterval(() => {
                currentBannerIdx = (currentBannerIdx + 1) % slides.length;
                container.style.transform = `translateX(-${currentBannerIdx * 100}%)`;
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderServices();
            renderCatalog(allCatalog);
            initBanner();
        });
    </script>
</body>
</html>
